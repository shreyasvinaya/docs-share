services:
  docs-share:
    build:
      context: .
      target: app
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /data
      WEB_DIST_DIR: /app/packages/web/dist
      HOOK_BASE_URL: http://127.0.0.1:3000
    volumes:
      - docs-share-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  docs-share-data:
